<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="이미지 통합기">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%233b82f6'/><text x='90' y='125' font-size='110' text-anchor='middle' fill='white'>🏠</text></svg>">
<title>이미지 통합기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3346;
    --text:#e8eaf0;--text2:#8b90a5;--accent:#3b82f6;--accent-hover:#2563eb;
    --danger:#ef4444;--success:#22c55e;--warn:#f59e0b;
  }
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  .app{max-width:1100px;margin:0 auto;padding:24px 16px 80px;}
  header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  header .icon{width:44px;height:44px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  header h1{font-size:20px;font-weight:900;letter-spacing:-0.5px;}
  header p{font-size:12px;color:var(--text2);margin-top:1px;}
  .steps{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .step{flex:1;min-width:0;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;gap:8px;opacity:.35;transition:all .3s;cursor:pointer;}
  .step.active{opacity:1;border-color:var(--accent);background:rgba(59,130,246,.08);}
  .step.done{opacity:.65;border-color:var(--success);}
  .step-num{width:24px;height:24px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .step.active .step-num{background:var(--accent);}
  .step.done .step-num{background:var(--success);}
  .step-label{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .panel{display:none;}.panel.show{display:block;}
  .upload-zone{border:2px dashed var(--border);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px;}
  .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(59,130,246,.05);}
  .upload-zone .big-icon{font-size:40px;margin-bottom:8px;}
  .upload-zone p{color:var(--text2);font-size:13px;}
  .upload-zone .hl{color:var(--accent);font-weight:700;}
  .image-list{display:flex;flex-wrap:wrap;gap:10px;align-items:stretch;margin-bottom:20px;}
  @media(max-width:480px){.image-list{gap:8px;}}
  .image-item{position:relative;aspect-ratio:4/3;width:150px;border-radius:9px;overflow:hidden;border:2px solid var(--border);cursor:grab;transition:transform .15s,box-shadow .15s;background:#111;touch-action:none;flex-shrink:0;}
  @media(max-width:480px){.image-item{width:calc(50% - 24px);}}
  .image-item:active{cursor:grabbing;}
  .image-item.dragging{opacity:.3;transform:scale(.92);}
  .image-item.drag-over{border-color:var(--accent);transform:scale(1.04);box-shadow:0 0 16px rgba(59,130,246,.35);}
  .image-item img{width:100%;height:100%;object-fit:contain;pointer-events:none;}
  .image-item .badge{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.75);color:#fff;min-width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;padding:0 5px;}
  .image-item .toolbar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);display:flex;justify-content:center;gap:2px;padding:3px;}
  @media(min-width:769px){.image-item .toolbar{opacity:0;transition:opacity .15s;}.image-item:hover .toolbar{opacity:1;}}
  .image-item .toolbar button{background:transparent;border:none;color:#fff;font-size:18px;width:36px;height:34px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .image-item .toolbar button:hover{background:rgba(255,255,255,.15);}
  .image-item .toolbar button.del:hover{background:rgba(239,68,68,.6);}
  .group-wrap{display:flex;align-items:stretch;gap:0;border:2px solid var(--accent);border-radius:12px;padding:5px;background:rgba(59,130,246,.06);position:relative;cursor:grab;touch-action:none;}
  .group-wrap:active{cursor:grabbing;}
  .group-wrap.dragging{opacity:.3;transform:scale(.95);}
  .group-wrap.drag-over{border-color:var(--success);transform:scale(1.02);box-shadow:0 0 20px rgba(59,130,246,.4);}
  .group-wrap .image-item{border-radius:7px;cursor:default;}
  .group-wrap .group-label{position:absolute;top:-10px;left:10px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 8px;border-radius:4px;z-index:1;}
  .bond-btn{display:flex;align-items:center;justify-content:center;width:44px;min-width:44px;height:auto;align-self:center;cursor:pointer;border:2px dashed var(--border);background:var(--surface);border-radius:10px;font-size:26px;font-weight:700;color:var(--text2);transition:all .2s;flex-shrink:0;padding:14px 0;}
  .bond-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.08);}
  .unbond-btn{display:flex;align-items:center;justify-content:center;width:32px;min-width:32px;align-self:center;cursor:pointer;border:none;background:rgba(239,68,68,.1);border-radius:6px;font-size:20px;color:var(--danger);transition:all .2s;flex-shrink:0;padding:8px 0;opacity:.7;}
  .unbond-btn:hover{opacity:1;background:rgba(239,68,68,.2);}
  .caption-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;}
  .caption-input:focus{border-color:var(--accent);}
  .caption-input::placeholder{color:var(--text2);}
  .actions{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap;}
  .btn{padding:12px 24px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap;min-height:46px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-primary:disabled{opacity:.35;cursor:not-allowed;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
  .btn-sm{padding:7px 14px;font-size:12px;}
  .opt-group{margin-bottom:18px;}
  .opt-label{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500;}
  .opt-row{display:flex;gap:8px;flex-wrap:wrap;}
  .opt-btn{padding:11px 20px;background:var(--surface);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;color:var(--text);transition:all .2s;min-height:44px;}
  .opt-btn:hover{border-color:var(--text2);}
  .opt-btn.sel{border-color:var(--accent);background:rgba(59,130,246,.08);}
  .slider-row{display:flex;align-items:center;gap:12px;}
  .slider-row input[type=range]{flex:1;accent-color:var(--accent);}
  .slider-val{font-size:14px;font-weight:700;min-width:50px;text-align:right;}
  .cover-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px;}
  .cover-form label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;margin-top:12px;font-weight:500;}
  .cover-form label:first-child{margin-top:0;}
  .cover-form input,.cover-form textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;resize:vertical;}
  .cover-form input:focus,.cover-form textarea:focus{border-color:var(--accent);}
  .cover-toggle{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .toggle-sw{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .toggle-sw.on{background:var(--accent);}
  .toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;}
  .toggle-sw.on::after{transform:translateX(20px);}
  .preview-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;overflow-x:auto;}
  .preview-page{background:#fff;width:100%;max-width:560px;margin:0 auto 16px;border-radius:3px;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.4);overflow:hidden;position:relative;}
  .preview-page.portrait{aspect-ratio:210/297;}
  .preview-page.landscape{aspect-ratio:297/210;}
  .preview-page .inner{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .preview-page .row{display:flex;flex:1;min-height:0;overflow:hidden;}
  .preview-page .cell{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f5f5f5;position:relative;min-width:0;min-height:0;}
  .preview-page .cell img{width:100%;height:100%;object-fit:contain;display:block;}
  .preview-page .cell .cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:4px 8px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .page-label{text-align:center;font-size:15px;color:var(--text);margin-bottom:6px;margin-top:18px;font-weight:700;}
  .page-layout-bar{display:flex;justify-content:center;gap:6px;margin-bottom:8px;}
  .page-layout-bar button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:5px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .page-layout-bar button.sel{border-color:var(--accent);color:var(--accent);}
  .page-layout-bar button.rst{color:var(--warn);border-color:var(--warn);}
  .cover-preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;text-align:center;padding:40px 30px;}
  .cover-preview .cv-office{font-size:14px;font-weight:700;color:#1a1a1a;}
  .cover-preview .cv-contact{font-size:11px;color:#666;margin-top:4px;}
  .cover-preview .cv-line{width:50px;height:2px;background:#3b82f6;margin:18px auto;}
  .cover-preview .cv-title{font-size:18px;font-weight:900;color:#111;line-height:1.3;}
  .cover-preview .cv-extra{font-size:11px;color:#555;margin-top:10px;line-height:1.6;}
  .info{font-size:13px;color:var(--text2);margin-bottom:12px;}
  .count-badge{background:var(--accent);color:#fff;padding:2px 10px;border-radius:14px;font-size:12px;font-weight:700;}
  .hidden{display:none!important;}
  .cap-list{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .cap-row{display:flex;gap:6px;align-items:center;}
  .cap-badge{font-size:12px;min-width:24px;height:24px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface2);font-weight:700;padding:0 4px;flex-shrink:0;}

  /* Mobile optimizations */
  @media(max-width:600px){
    .app{padding:16px 12px 60px;}
    header{margin-bottom:14px;}
    header h1{font-size:18px;}
    .steps{margin-bottom:14px;}
    .upload-zone{padding:28px 16px;}
    .upload-zone .big-icon{font-size:36px;}
    .image-item{width:calc(50% - 28px);}
    .group-wrap{padding:4px;gap:0;}
    .bond-btn{width:40px;min-width:40px;font-size:24px;padding:12px 0;}
    .btn{width:100%;justify-content:center;padding:14px 20px;font-size:15px;}
    .actions{flex-direction:column;}
    .btn-sm{width:auto;}
    .opt-btn{flex:1;text-align:center;justify-content:center;padding:12px 10px;}
    .cover-form{padding:16px;}
    .preview-area{padding:12px;}
    .caption-input{padding:10px;font-size:14px;}
    .slider-row input[type=range]{height:36px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="icon">🏠</div>
    <div>
      <h1>이미지 통합기</h1>
      <p>이미지 추가 → 설정 → 미리보기 → PDF 저장</p>
    </div>
  </header>

  <div class="steps">
    <div class="step active" data-step="1"><div class="step-num">1</div><div class="step-label">이미지</div></div>
    <div class="step" data-step="2"><div class="step-num">2</div><div class="step-label">설정</div></div>
    <div class="step" data-step="3"><div class="step-num">3</div><div class="step-label">미리보기</div></div>
  </div>

  <!-- Step 1 -->
  <div class="panel show" id="panel1">
    <div class="upload-zone" id="dropZone">
      <div class="big-icon">📁</div>
      <p><span class="hl">클릭</span> 또는 이미지를 여기에 드래그</p>
      <p style="margin-top:3px;font-size:11px;color:var(--text2);">JPG, PNG, WEBP</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <p class="info" id="imageCount"></p>
    <div class="image-list" id="imageList"></div>
    <div id="captionArea"></div>
    <div class="actions">
      <button class="btn btn-primary" id="nextBtn1" disabled>설정 단계 →</button>
      <button class="btn btn-danger btn-sm hidden" id="clearBtn">전체 삭제</button>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="panel" id="panel2">
    <div class="opt-group">
      <div class="opt-label">파일명</div>
      <input id="fileName" class="caption-input" style="font-size:14px;padding:10px 12px;" placeholder="파일명을 입력하세요" value="">
    </div>
    <div class="opt-group">
      <div class="cover-toggle">
        <div class="toggle-sw" id="coverToggle"></div>
        <span style="font-size:13px;font-weight:700;">표지 페이지</span>
      </div>
      <div class="cover-form hidden" id="coverForm">
        <label>중개사무소명</label>
        <input id="cvOffice" placeholder="예: ○○공인중개사사무소">
        <label>연락처</label>
        <input id="cvContact" placeholder="예: 010-1234-5678">
        <label>매물 제목</label>
        <input id="cvTitle" placeholder="예: 강남역 오피스텔 매매">
        <label>추가 정보 (선택)</label>
        <textarea id="cvExtra" rows="2" placeholder="예: 전용 84㎡ / 매매가 5.2억 / 남향"></textarea>
      </div>
    </div>
    <div class="opt-group">
      <div class="opt-label">용지 방향</div>
      <div class="opt-row" id="orientOpts">
        <button class="opt-btn" data-val="portrait">📄 세로</button>
        <button class="opt-btn sel" data-val="landscape">📄 가로</button>
      </div>
    </div>
    <div class="opt-group">
      <div class="opt-label">여백</div>
      <div class="slider-row">
        <input type="range" id="marginSlider" min="0" max="20" value="0" step="1">
        <span class="slider-val" id="marginVal">0mm</span>
      </div>
      <div id="marginPreview" style="display:flex;justify-content:center;margin-top:14px;">
        <div id="marginBox" style="border:2px solid var(--text2);border-radius:3px;position:relative;background:var(--surface2);">
          <div id="marginInner" style="position:absolute;border-radius:1px;"></div>
          <div id="marginLabel" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap;">여백 없음</div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="prevBtn2">← 이전</button>
      <button class="btn btn-primary" id="nextBtn2">미리보기 →</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="panel" id="panel3">
    <p class="info">그룹으로 묶인 이미지는 같은 페이지에 배치됩니다. 그룹이 없으면 1장 = 1페이지.</p>
    <div class="preview-area" id="previewArea"></div>
    <div class="actions" style="margin-top:20px;">
      <button class="btn btn-secondary" id="prevBtn3">← 설정</button>
      <button class="btn btn-primary" id="saveBtn">💾 PDF 저장</button>
      <button class="btn btn-primary" id="shareBtn" style="background:#FEE500;color:#3C1E1E;">💬 카톡 공유</button>
    </div>
  </div>
</div>

<script>
const {jsPDF} = window.jspdf;

let images = [];
let orientation = 'landscape';
let marginMM = 0;
let coverEnabled = false;
let touchClone = null;
let bondPairs = new Set(); // "id1:id2" bonds

function areBonded(i,j) {
  if(Math.abs(i-j)!==1||i<0||j<0||i>=images.length||j>=images.length) return false;
  const a=Math.min(i,j),b=Math.max(i,j);
  return bondPairs.has(images[a].id+':'+images[b].id);
}
function addBond(i) { bondPairs.add(images[i].id+':'+images[i+1].id); }
function removeBond(i) { bondPairs.delete(images[i].id+':'+images[i+1].id); }
function getGroups() {
  const groups=[]; let i=0;
  while(i<images.length) {
    const g=[i];
    while(i<images.length-1 && areBonded(i,i+1)){i++;g.push(i);}
    groups.push(g); i++;
  }
  return groups;
}

const $ = id => document.getElementById(id);
const dropZone = $('dropZone'), fileInput = $('fileInput'), imageList = $('imageList');
const captionArea = $('captionArea'), imageCount = $('imageCount');
const nextBtn1 = $('nextBtn1'), clearBtn = $('clearBtn');
const marginSlider = $('marginSlider'), marginVal = $('marginVal');
const coverToggle = $('coverToggle'), coverForm = $('coverForm');

// Restore saved cover
try {
  const s = JSON.parse(localStorage.getItem('cv'));
  if (s) setTimeout(() => { $('cvOffice').value=s.o||''; $('cvContact').value=s.c||''; },0);
} catch(e){}

coverToggle.addEventListener('click', () => {
  coverEnabled = !coverEnabled;
  coverToggle.classList.toggle('on', coverEnabled);
  coverForm.classList.toggle('hidden', !coverEnabled);
});

['cvOffice','cvContact'].forEach(id => {
  $(id).addEventListener('change', () => {
    try { localStorage.setItem('cv', JSON.stringify({o:$('cvOffice').value,c:$('cvContact').value})); } catch(e){}
  });
});

marginSlider.addEventListener('input', () => { marginMM=parseInt(marginSlider.value); marginVal.textContent=marginMM+'mm'; updateMarginPreview(); });

function updateMarginPreview() {
  const pw = orientation==='portrait' ? 210 : 297;
  const ph = orientation==='portrait' ? 297 : 210;
  const scale = 0.85;
  const boxW = pw * scale, boxH = ph * scale;
  const box = $('marginBox');
  box.style.width = boxW + 'px'; box.style.height = boxH + 'px';
  box.style.background = '#fff';
  const inner = $('marginInner');
  const mPx = marginMM * scale;
  inner.style.left = mPx + 'px'; inner.style.top = mPx + 'px';
  inner.style.right = mPx + 'px'; inner.style.bottom = mPx + 'px';
  if (marginMM > 0) {
    inner.style.background = 'rgba(59,130,246,0.08)';
    inner.style.border = '2px dashed rgba(59,130,246,0.8)';
  } else {
    inner.style.background = 'transparent';
    inner.style.border = 'none';
  }
  inner.style.opacity = '1';
  const label = $('marginLabel');
  label.style.color = '#888';
  if (marginMM === 0) { label.textContent = '여백 없음'; }
  else { label.textContent = `${marginMM}mm`; }
}

function setupOpts(cid, cb) {
  const c = $(cid);
  c.querySelectorAll('.opt-btn').forEach(b => b.addEventListener('click', () => {
    c.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    cb(b.dataset.val);
  }));
}
setupOpts('orientOpts', v => { orientation=v; updateMarginPreview(); });

// Files
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value=''; });

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = ev => { images.push({id:Date.now()+Math.random(),dataUrl:ev.target.result,name:f.name,rotation:0,caption:''}); renderImages(); };
    r.readAsDataURL(f);
  });
}

function renderImages() {
  imageList.innerHTML = '';
  const groups = getGroups();

  groups.forEach((group, gi) => {
    const isMulti = group.length > 1;
    let dragEl;

    if (isMulti) {
      const wrap = document.createElement('div');
      wrap.className = 'group-wrap';
      wrap.draggable = true;
      wrap.dataset.gi = gi;
      const label = document.createElement('div');
      label.className = 'group-label';
      label.textContent = '그룹';
      wrap.appendChild(label);

      group.forEach((imgIdx, j) => {
        const item = makeImgDiv(imgIdx, false); // not individually draggable
        wrap.appendChild(item);
        if (j < group.length - 1) {
          const ub = document.createElement('button');
          ub.className = 'unbond-btn';
          ub.innerHTML = '✕';
          ub.title = '그룹 해제';
          ub.addEventListener('click', e => { e.stopPropagation(); removeBond(imgIdx); renderImages(); });
          wrap.appendChild(ub);
        }
      });
      addGroupDrag(wrap, gi, groups);
      imageList.appendChild(wrap);
    } else {
      const item = makeImgDiv(group[0], true);
      item.dataset.gi = gi;
      addGroupDrag(item, gi, groups);
      imageList.appendChild(item);
    }

    // '+' button between groups
    if (gi < groups.length - 1) {
      const lastIdx = group[group.length - 1];
      const bb = document.createElement('button');
      bb.className = 'bond-btn';
      bb.innerHTML = '+';
      bb.title = '그룹 묶기';
      bb.addEventListener('click', () => { addBond(lastIdx); renderImages(); });
      imageList.appendChild(bb);
    }
  });

  // Captions
  captionArea.innerHTML = '';
  if (images.length) {
    const w = document.createElement('div'); w.className='cap-list';
    const t = document.createElement('div'); t.className='opt-label'; t.textContent='이미지 캡션 (선택)'; w.appendChild(t);
    images.forEach((img, i) => {
      const row = document.createElement('div'); row.className='cap-row';
      row.innerHTML = `<span class="cap-badge">${i+1}</span>`;
      const inp = document.createElement('input'); inp.className='caption-input';
      inp.placeholder='주소, 가격, 면적 등'; inp.value=img.caption;
      inp.addEventListener('input', e => images[i].caption=e.target.value);
      row.appendChild(inp); w.appendChild(row);
    });
    captionArea.appendChild(w);
  }

  const n=images.length;
  imageCount.innerHTML = n ? `총 <span class="count-badge">${n}장</span> · 드래그하여 순서 변경 · + 버튼으로 그룹 묶기` : '';
  nextBtn1.disabled = n===0;
  clearBtn.classList.toggle('hidden', n===0);
}

// Group-level drag (desktop + touch)
let dragGI = null;
let touchDragGI = null;

function addGroupDrag(el, gi, groups) {
  // Desktop
  el.addEventListener('dragstart', e => {
    dragGI = gi;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragGI = null; });
  el.addEventListener('dragover', e => { e.preventDefault(); if (dragGI !== null && dragGI !== gi) el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-over');
    if (dragGI === null || dragGI === gi) return;
    moveGroup(dragGI, gi);
    dragGI = null;
  });

  // Touch
  el.addEventListener('touchstart', e => {
    if (e.target.closest('.toolbar') || e.target.closest('.unbond-btn')) return;
    touchDragGI = gi;
    const t = e.touches[0], r = el.getBoundingClientRect();
    touchClone = el.cloneNode(true);
    touchClone.style.cssText = `position:fixed;z-index:9999;width:${r.width}px;height:${r.height}px;opacity:.75;pointer-events:none;left:${t.clientX-r.width/2}px;top:${t.clientY-r.height/2}px;`;
    document.body.appendChild(touchClone);
    el.classList.add('dragging');
  }, {passive:false});

  el.addEventListener('touchmove', e => {
    if (touchDragGI === null) return;
    e.preventDefault();
    if (touchClone) {
      const t = e.touches[0];
      touchClone.style.left = (t.clientX - touchClone.offsetWidth/2) + 'px';
      touchClone.style.top = (t.clientY - touchClone.offsetHeight/2) + 'px';
    }
    document.querySelectorAll('.image-item,.group-wrap').forEach(x => x.classList.remove('drag-over'));
    const t = e.touches[0];
    const target = document.elementFromPoint(t.clientX, t.clientY);
    const dropEl = target?.closest?.('.group-wrap') || target?.closest?.('.image-item[data-gi]');
    if (dropEl && parseInt(dropEl.dataset.gi) !== touchDragGI) dropEl.classList.add('drag-over');
  }, {passive:false});

  el.addEventListener('touchend', e => {
    if (touchClone) { touchClone.remove(); touchClone = null; }
    document.querySelectorAll('.image-item,.group-wrap').forEach(x => { x.classList.remove('dragging','drag-over'); });
    if (touchDragGI === null) return;
    const t = e.changedTouches[0];
    const target = document.elementFromPoint(t.clientX, t.clientY);
    const dropEl = target?.closest?.('.group-wrap') || target?.closest?.('.image-item[data-gi]');
    if (dropEl) {
      const targetGI = parseInt(dropEl.dataset.gi);
      if (touchDragGI !== targetGI) moveGroup(touchDragGI, targetGI);
    }
    touchDragGI = null;
  });
}

function moveGroup(fromGI, toGI) {
  const groups = getGroups();
  const srcGroup = groups[fromGI];
  const srcImgs = srcGroup.map(i => images[i]);
  // Remove source images (from highest index first)
  const sortedSrc = [...srcGroup].sort((a,b) => b-a);
  sortedSrc.forEach(i => images.splice(i, 1));
  // Recalculate target insert position
  const groupsAfter = getGroups();
  const adjustedToGI = toGI > fromGI ? toGI - 1 : toGI;
  let insertIdx = 0;
  if (adjustedToGI >= 0 && adjustedToGI < groupsAfter.length) {
    insertIdx = groupsAfter[adjustedToGI][0];
  }
  // Insert source images at target
  images.splice(insertIdx, 0, ...srcImgs);
  // Rebuild bonds for the moved group
  for (let k = 0; k < srcImgs.length - 1; k++) {
    bondPairs.add(srcImgs[k].id + ':' + srcImgs[k+1].id);
  }
  renderImages();
}

function makeImgDiv(i, isDraggable) {
  const img = images[i];
  const div = document.createElement('div');
  div.className = 'image-item';
  div.draggable = isDraggable;
  div.dataset.idx = i;
  const rot = img.rotation ? `transform:rotate(${img.rotation}deg)` : '';
  div.innerHTML = `<img src="${img.dataUrl}" style="${rot}"><div class="badge">${i+1}</div>
    <div class="toolbar">
      <button title="왼쪽 회전" onclick="rotImg(${i},-90)">↺</button>
      <button title="오른쪽 회전" onclick="rotImg(${i},90)">↻</button>
      <button class="del" title="삭제" onclick="delImg(${i})">✕</button>
    </div>`;
  return div;
}

window.rotImg = (i,d) => { images[i].rotation=(images[i].rotation+d+360)%360; renderImages(); };
window.delImg = i => {
  // Remove any bonds involving this image
  const id = images[i].id;
  bondPairs.forEach(b => { if(b.includes(id)) bondPairs.delete(b); });
  images.splice(i,1); renderImages();
};
clearBtn.addEventListener('click', () => { images=[]; bondPairs.clear(); renderImages(); });

// Navigation
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => {
    const sn=parseInt(s.dataset.step); s.classList.remove('active','done');
    if (sn===n) s.classList.add('active'); else if(sn<n) s.classList.add('done');
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
  $('panel'+n).classList.add('show');
  if (n===3) generatePreview();
}
document.querySelectorAll('.step').forEach(s => s.addEventListener('click', () => { const sn=parseInt(s.dataset.step); if(sn===1||images.length>0) goStep(sn); }));
nextBtn1.addEventListener('click', () => goStep(2));
$('prevBtn2').addEventListener('click', () => goStep(1));
$('nextBtn2').addEventListener('click', () => goStep(3));
$('prevBtn3').addEventListener('click', () => goStep(2));

// Build pages (each group = one page)
function buildPages() {
  const pages = [];
  if (coverEnabled) pages.push({type:'cover'});
  const groups = getGroups();
  for (const group of groups) {
    const groupImgs = group.map(i => images[i]);
    const n = groupImgs.length;
    // Determine layout from group size
    let layout;
    if (n <= 1) layout = 1;
    else if (n <= 2) layout = 2;
    else if (n <= 4) layout = 4;
    else layout = 6;
    pages.push({type:'images', images:groupImgs, layout});
  }
  return pages;
}

// Preview
function generatePreview() {
  const area=$('previewArea'); area.innerHTML='';
  const pages=buildPages();
  pages.forEach((pg, pi) => {
    const label=document.createElement('div'); label.className='page-label';
    label.textContent=`${pi+1} / ${pages.length}`; area.appendChild(label);

    if (pg.type==='images') {
      // Show group image count
      const info=document.createElement('div'); info.className='page-layout-bar';
      const b=document.createElement('span'); b.style.cssText='font-size:12px;color:var(--text2);';
      b.textContent=pg.images.length+'장'; info.appendChild(b);
      area.appendChild(info);
    }

    const page=document.createElement('div');
    page.className='preview-page '+orientation;
    const mPct = orientation==='portrait' ? (marginMM/210*100) : (marginMM/297*100);
    page.style.padding = mPct+'%';

    if (pg.type==='cover') {
      page.innerHTML = coverHTML();
    } else {
      const inner=document.createElement('div'); inner.className='inner';
      const g = marginMM>0?'2px':'0'; inner.style.gap=g;
      const lo=pg.layout, imgs=pg.images;
      if (lo===1) { inner.appendChild(makeRow(imgs.slice(0,1),g)); }
      else if (lo===2) { imgs.forEach(im => inner.appendChild(makeRow([im],g))); }
      else if (lo===4) { for(let r=0;r<2;r++) inner.appendChild(makeRow(imgs.slice(r*2,r*2+2),g)); }
      else if (lo===6) { for(let r=0;r<3;r++) inner.appendChild(makeRow(imgs.slice(r*2,r*2+2),g)); }
      page.appendChild(inner);
    }
    area.appendChild(page);
  });
}

function makeRow(imgs, gap) {
  const row=document.createElement('div'); row.className='row'; row.style.gap=gap;
  imgs.forEach(img => {
    const cell=document.createElement('div'); cell.className='cell';
    const rot=img.rotation?`transform:rotate(${img.rotation}deg)`:'';
    cell.innerHTML=`<img src="${img.dataUrl}" style="${rot}">`;
    if(img.caption) cell.innerHTML+=`<div class="cap">${img.caption}</div>`;
    row.appendChild(cell);
  });
  return row;
}

function coverHTML() {
  const o=$('cvOffice').value, c=$('cvContact').value, t=$('cvTitle').value||'매물 안내', x=$('cvExtra').value;
  return `<div class="cover-preview">
    ${o?`<div class="cv-office">${o}</div>`:''}
    ${c?`<div class="cv-contact">${c}</div>`:''}
    <div class="cv-line"></div>
    <div class="cv-title">${t}</div>
    ${x?`<div class="cv-extra">${x.replace(/\n/g,'<br>')}</div>`:''}
  </div>`;
}

// PDF generation (reusable)
async function generatePDF() {
  const ori=orientation==='landscape'?'l':'p';
  const pdf=new jsPDF(ori,'mm','a4');
  const pw=orientation==='landscape'?297:210, ph=orientation==='landscape'?210:297;
  const m=marginMM, uw=pw-m*2, uh=ph-m*2, gap=m>0?2:0;
  const pages=buildPages();
  const capH=5;

  for (let pi=0;pi<pages.length;pi++) {
    if(pi>0) pdf.addPage();
    const pg=pages[pi];
    if (pg.type==='cover') { renderCoverPDF(pdf,pw,ph); continue; }
    const lo=pg.layout, imgs=pg.images;
    if (lo===1) {
      if(imgs[0]) { const ch=imgs[0].caption?capH:0; await addImg(pdf,imgs[0],m,m,uw,uh-ch); if(imgs[0].caption) drawCap(pdf,imgs[0].caption,m,m+uh-ch,uw,ch); }
    } else if (lo===2) {
      const cellH=(uh-gap)/2;
      for(let i=0;i<imgs.length;i++) { const ch=imgs[i].caption?capH:0; const y=m+i*(cellH+gap); await addImg(pdf,imgs[i],m,y,uw,cellH-ch); if(imgs[i].caption) drawCap(pdf,imgs[i].caption,m,y+cellH-ch,uw,ch); }
    } else if (lo===4) {
      const cw=(uw-gap)/2, ch2=(uh-gap)/2;
      for(let i=0;i<imgs.length;i++) { const r=Math.floor(i/2),c=i%2; const cc=imgs[i].caption?capH:0; const x=m+c*(cw+gap),y=m+r*(ch2+gap); await addImg(pdf,imgs[i],x,y,cw,ch2-cc); if(imgs[i].caption) drawCap(pdf,imgs[i].caption,x,y+ch2-cc,cw,cc); }
    } else if (lo===6) {
      const cw=(uw-gap)/2, ch3=(uh-gap*2)/3;
      for(let i=0;i<imgs.length;i++) { const r=Math.floor(i/2),c=i%2; const cc=imgs[i].caption?capH:0; const x=m+c*(cw+gap),y=m+r*(ch3+gap); await addImg(pdf,imgs[i],x,y,cw,ch3-cc); if(imgs[i].caption) drawCap(pdf,imgs[i].caption,x,y+ch3-cc,cw,cc); }
    }
  }
  return pdf;
}

function getFileName() {
  const name = $('fileName').value.trim();
  return (name || '문서') + '.pdf';
}

// PDF 저장
$('saveBtn').addEventListener('click', async () => {
  const btn=$('saveBtn'); btn.disabled=true; btn.textContent='⏳ 생성 중...';
  try {
    const pdf = await generatePDF();
    pdf.save(getFileName());
  } catch(e) { alert('오류: '+e.message); }
  btn.disabled=false; btn.textContent='💾 PDF 저장';
});

// 카톡 공유
$('shareBtn').addEventListener('click', async () => {
  const btn=$('shareBtn'); btn.disabled=true; btn.textContent='⏳ 생성 중...';
  try {
    const pdf = await generatePDF();
    const fname = getFileName();
    const blob = pdf.output('blob');
    const file = new File([blob], fname, {type:'application/pdf'});

    if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      await navigator.share({
        title: fname.replace('.pdf',''),
        files: [file]
      });
    } else {
      pdf.save(fname);
      alert('이 브라우저에서는 직접 공유가 안 됩니다.\nPDF가 다운로드되었으니 카톡에서 직접 첨부해주세요.');
    }
  } catch(e) {
    if (e.name !== 'AbortError') alert('오류: '+e.message);
  }
  btn.disabled=false; btn.textContent='💬 카톡 공유';
});

function drawCap(pdf,text,x,y,w,h) {
  pdf.setFillColor(40,40,40); pdf.rect(x,y,w,h,'F');
  pdf.setTextColor(255,255,255); pdf.setFontSize(8);
  pdf.text(text,x+w/2,y+h/2+1,{align:'center',maxWidth:w-4});
  pdf.setTextColor(0,0,0);
}

function addImg(pdf,imgObj,x,y,w,h) {
  return new Promise(resolve => {
    if (imgObj.rotation) {
      const tmp=new Image();
      tmp.onload=()=>{
        const cv=document.createElement('canvas');
        const rad=imgObj.rotation*Math.PI/180;
        const sin=Math.abs(Math.sin(rad)),cos=Math.abs(Math.cos(rad));
        cv.width=tmp.width*cos+tmp.height*sin;
        cv.height=tmp.width*sin+tmp.height*cos;
        const ctx=cv.getContext('2d');
        ctx.translate(cv.width/2,cv.height/2); ctx.rotate(rad);
        ctx.drawImage(tmp,-tmp.width/2,-tmp.height/2);
        fit(pdf,cv.toDataURL('image/jpeg',.92),cv.width,cv.height,x,y,w,h); resolve();
      };
      tmp.src=imgObj.dataUrl;
    } else {
      const img=new Image();
      img.onload=()=>{ fit(pdf,imgObj.dataUrl,img.width,img.height,x,y,w,h); resolve(); };
      img.src=imgObj.dataUrl;
    }
  });
}

function fit(pdf,du,iw,ih,x,y,w,h) {
  const ir=iw/ih, cr=w/h;
  let dw,dh,dx,dy;
  if(ir>cr){dw=w;dh=w/ir;dx=x;dy=y+(h-dh)/2;}
  else{dh=h;dw=h*ir;dx=x+(w-dw)/2;dy=y;}
  pdf.addImage(du,'JPEG',dx,dy,dw,dh);
}

function renderCoverPDF(pdf,pw,ph) {
  const o=$('cvOffice').value,c=$('cvContact').value,t=$('cvTitle').value||'매물 안내',x=$('cvExtra').value;
  let cy=ph*.35;
  pdf.setFontSize(14); pdf.setFont(undefined,'bold');
  if(o){pdf.text(o,pw/2,cy,{align:'center'});cy+=8;}
  pdf.setFontSize(10); pdf.setFont(undefined,'normal');
  if(c){pdf.text(c,pw/2,cy,{align:'center'});cy+=10;}
  pdf.setDrawColor(59,130,246); pdf.setLineWidth(.5);
  pdf.line(pw/2-20,cy,pw/2+20,cy); cy+=10;
  pdf.setFontSize(22); pdf.setFont(undefined,'bold');
  pdf.text(t,pw/2,cy,{align:'center'}); cy+=12;
  if(x){pdf.setFontSize(10);pdf.setFont(undefined,'normal');
    x.split('\n').forEach(l=>{pdf.text(l,pw/2,cy,{align:'center'});cy+=6;});}
}
